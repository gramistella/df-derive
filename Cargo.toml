[[bench]]
name = "13_datetime_decimal_columns"
harness = false

[[bench]]
name = "14_as_string_enum"
harness = false

[[bench]]
name = "15_as_str_enum"
harness = false

[[bench]]
name = "16_option_vec_option_struct"
harness = false

[[bench]]
