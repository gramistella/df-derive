name: CI

on:
  push:
    branches:
      - '**'
    tags: # Run on tags so that bencher can track performance across versions
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    paths-ignore:
      - '**/*.md'
      - '*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '*.md'

permissions:
  contents: read
  pages: write
  pull-requests: write
  id-token: write
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust 1.89
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --all-features --all-targets --locked

  build:
    name: Lint and test
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      # Avoid intermittent rust-lld SIGBUS crashes while linking the
      # Polars-heavy trybuild binaries on GitHub-hosted Linux runners. Use
      # Cargo's target-specific env vars so nested trybuild Cargo invocations
      # inherit the linker choice too.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C linker-features=-lld -C link-arg=-fuse-ld=bfd"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Tests
        env:
          CARGO_BUILD_JOBS: '1'
        run: cargo test --workspace --all-features --all-targets -- --nocapture

      - name: Check package contents
        run: cargo package --workspace --list

      - name: Publish dry run
        run: cargo publish --workspace --dry-run

  bench:
    name: Benchmarks (after tests)
    needs: build
    if: ${{ needs.build.result == 'success' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    uses: ./.github/workflows/bench.yml
    with:
      event_name: ${{ github.event_name }}
      ref: ${{ github.ref }}
    secrets: inherit
